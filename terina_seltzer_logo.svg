<svg viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg" width="320" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e45;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E4057;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B8DB8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7EC8C8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="320" height="100" rx="14" ry="14" fill="url(#bgGrad)" />

  <!-- Left accent bar -->
  <rect x="18" y="20" width="4" height="60" rx="2" fill="url(#accentGrad)" />

  <!-- TERINA large and prominent -->
  <text
    x="34"
    y="62"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42"
    font-weight="700"
    letter-spacing="4"
    fill="white"
  >TERINA</text>

  <!-- SELTZER smaller, lighter, spaced below -->
  <text
    x="36"
    y="82"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="300"
    letter-spacing="8"
    fill="url(#accentGrad)"
  >SELTZER</text>

  <!-- Dot accent cluster -->
  <circle cx="296" cy="44" r="4" fill="url(#accentGrad)" opacity="0.8"/>
  <circle cx="296" cy="58" r="2.5" fill="url(#accentGrad)" opacity="0.5"/>
  <circle cx="296" cy="69" r="1.5" fill="url(#accentGrad)" opacity="0.3"/>
</svg>
